{% extends "ui_gsm/base.html" %}
{% block title %}Redirecting...{% endblock %}
{% block content %}
  <section class="card" style="padding: 24px;">
    <h2>Redirecting to payment</h2>
    <p>Please wait while we connect to the payment gateway.</p>
    <form id="easebuzz-payment-form" method="post" action="{{ post_url }}">
      {% for key, value in payload.items %}
        <input type="hidden" name="{{ key }}" value="{{ value }}">
      {% endfor %}
    </form>
    <noscript>
      <p>JavaScript is required. Click continue to proceed.</p>
      <button type="submit" form="easebuzz-payment-form" class="btn btn--primary">Continue</button>
    </noscript>
  </section>
  <script>
    document.getElementById("easebuzz-payment-form").submit();
  </script>
{% endblock %}
